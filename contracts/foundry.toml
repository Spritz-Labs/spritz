[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Optional: forge script --rpc-url mainnet  (set MAINNET_RPC_URL, e.g. dRPC)
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
drpc = "https://eth.drpc.org/"

# Etherscan contract verification: set ETHERSCAN_API_KEY in contracts/.env
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
